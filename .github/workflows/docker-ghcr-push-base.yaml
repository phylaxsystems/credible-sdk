name: Docker GHCR Push Base Image

on:
  push:
    branches: [main, add-base-image-cached]
    paths:
      - 'dockerfile/Dockerfile.base'
      - 'rust-toolchain.toml'
  workflow_dispatch:
  # Allow the container push workflow to call this as a reusable workflow
  workflow_call:
    outputs:
      image:
        description: "Full base image reference (registry/repo:tag)"
        value: ${{ jobs.build-base.outputs.image }}

permissions:
  packages: write
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rust-chef-base

jobs:
  build-base:
    runs-on:
      group: big-bois-x86
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "image=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.base
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
